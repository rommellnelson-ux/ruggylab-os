name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit pip-audit detect-secrets mypy

      - name: Run Ruff (lint + format)
        run: |
          ruff check .
          ruff format --check .

      - name: Run Mypy
        run: mypy app

      - name: Run Bandit
        run: bandit -q -r app -c pyproject.toml

      - name: Audit dependencies
        run: |
          # PYSEC-2025-183 affects PyJWT but has no published fix version yet.
          # We pin to the latest available release (2.12.1) and explicitly
          # acknowledge this advisory until an upstream fix is released.
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2025-183

      - name: Scan for secrets
        run: |
          python -m detect_secrets.pre_commit_hook --baseline .secrets.baseline $(git ls-files)

      - name: Run test suite
        run: pytest

  codeql:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze code
        uses: github/codeql-action/analyze@v3
        with:
          category: "security"

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [test, codeql]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/ruggylab-os:${{ github.sha }}
          labels: |
            org.opencontainers.image.title=RuggyLab OS
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
