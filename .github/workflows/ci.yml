name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit pip-audit detect-secrets mypy

      - name: Run Ruff (lint + format)
        run: |
          ruff check .
          ruff format --check .

      - name: Run Mypy
        run: mypy app

      - name: Run Bandit
        run: bandit -q -r app -c pyproject.toml

      - name: Audit dependencies
        run: pip-audit -r requirements.txt

      - name: Scan for secrets
        run: |
          python -m detect_secrets.pre_commit_hook --baseline .secrets.baseline $(git ls-files)

      - name: Run test suite
        run: pytest

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ruggylab
          POSTGRES_PASSWORD: ruggylab_test
          POSTGRES_DB: ruggylab_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations (upgrade)
        env:
          DATABASE_URL: postgresql+psycopg://ruggylab:ruggylab_test@localhost:5432/ruggylab_test
          SECRET_KEY: ci-secret-key-minimum-32-characters-long
          FIRST_SUPERUSER_PASSWORD: CiPassword123!Secure
        run: alembic upgrade head

      - name: Verify migration idempotency (downgrade → upgrade)
        env:
          DATABASE_URL: postgresql+psycopg://ruggylab:ruggylab_test@localhost:5432/ruggylab_test
          SECRET_KEY: ci-secret-key-minimum-32-characters-long
          FIRST_SUPERUSER_PASSWORD: CiPassword123!Secure
        run: |
          alembic downgrade base
          alembic upgrade head

      - name: Smoke-test app startup against PostgreSQL
        env:
          DATABASE_URL: postgresql+psycopg://ruggylab:ruggylab_test@localhost:5432/ruggylab_test
          SECRET_KEY: ci-secret-key-minimum-32-characters-long
          FIRST_SUPERUSER_PASSWORD: CiPassword123!Secure
          TESTING: "true"
        run: |
          python - <<'EOF'
          import os
          os.environ.setdefault("TESTING", "true")
          import app.db.session as db_session
          from app.db.session import engine
          from app.db.base import Base
          from app.services.bootstrap import init_db
          # Verify the ORM can query the migrated schema
          from sqlalchemy import text
          with engine.connect() as conn:
              result = conn.execute(text("SELECT count(*) FROM users"))
              count = result.scalar()
          print(f"PostgreSQL smoke-test OK — {count} user(s) in DB")
          EOF

  codeql:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze code
        uses: github/codeql-action/analyze@v4
        with:
          category: "security"

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [test, codeql]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/ruggylab-os:${{ github.sha }}
          labels: |
            org.opencontainers.image.title=RuggyLab OS
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
