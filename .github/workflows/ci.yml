name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  test:
    name: Lint, type-check, security and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit pip-audit detect-secrets mypy

      # ── Hard gates (must pass) ──────────────────────────────────────────────
      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy (type check)
        run: mypy app

      - name: Bandit security scan
        run: bandit -q -r app -c pyproject.toml

      - name: Test suite
        run: pytest

      # ── Advisory gates (depend on external state — run and report, never block) ──
      - name: Dependency audit (advisory)
        continue-on-error: true
        run: pip-audit -r requirements.txt

      - name: Secret scan (advisory)
        continue-on-error: true
        run: python -m detect_secrets.pre_commit_hook --baseline .secrets.baseline $(git ls-files)

  test-postgres:
    name: Migrations + flux clinique E2E (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ruggylab
          POSTGRES_PASSWORD: ruggylab_test
          POSTGRES_DB: ruggylab_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations (upgrade)
        env:
          DATABASE_URL: postgresql+psycopg://ruggylab:ruggylab_test@localhost:5432/ruggylab_test
          SECRET_KEY: ci-secret-key-minimum-32-characters-long
          FIRST_SUPERUSER_PASSWORD: CiPassword123!Secure
        run: alembic upgrade head

      - name: Verify migration idempotency (downgrade → upgrade)
        env:
          DATABASE_URL: postgresql+psycopg://ruggylab:ruggylab_test@localhost:5432/ruggylab_test
          SECRET_KEY: ci-secret-key-minimum-32-characters-long
          FIRST_SUPERUSER_PASSWORD: CiPassword123!Secure
        run: |
          alembic downgrade base
          alembic upgrade head

      - name: Verify clinical, analyzer, and laboratory-number locking on PostgreSQL
        env:
          DATABASE_URL: postgresql+psycopg://ruggylab:ruggylab_test@localhost:5432/ruggylab_test
          SECRET_KEY: ci-secret-key-minimum-32-characters-long
          FIRST_SUPERUSER_PASSWORD: CiPassword123!Secure
          TESTING: "true"
        run: >
          python -m pytest -q
          tests/test_clinical_safety_postgres.py
          tests/test_analyzer_idempotency_r6_postgres.py
          tests/test_lab_numbering_r5_postgres.py
          tests/test_preanalytic_cancelled_sample_postgres.py
          tests/test_quality_transaction_postgres.py
          tests/test_finance_transaction_postgres.py
          tests/test_imaging_transaction_postgres.py
          tests/test_auth_session_postgres.py

      - name: Smoke-test app startup against PostgreSQL
        env:
          DATABASE_URL: postgresql+psycopg://ruggylab:ruggylab_test@localhost:5432/ruggylab_test
          SECRET_KEY: ci-secret-key-minimum-32-characters-long
          FIRST_SUPERUSER_PASSWORD: CiPassword123!Secure
          TESTING: "true"
        run: |
          python - <<'EOF'
          import os
          os.environ.setdefault("TESTING", "true")
          from sqlalchemy import text

          from app.db.session import engine

          with engine.connect() as conn:
              count = conn.execute(text("SELECT count(*) FROM users")).scalar()
          print(f"PostgreSQL smoke-test OK — {count} user(s) in DB")
          EOF

      # ── Flux clinique complet sur PostgreSQL (bloquant) ──────────────────────
      # patient → échantillon → prescription → rattachement → résultat → fil →
      # cloisonnement comptable → facture → encaissement → synthèse.
      # Réutilise scripts/uat_smoke.py (le « 15/15 » de la checklist go-live),
      # exécuté ici contre une instance réelle adossée à PostgreSQL 16.
      - name: Start application against PostgreSQL
        env:
          DATABASE_URL: postgresql+psycopg://ruggylab:ruggylab_test@localhost:5432/ruggylab_test
          SECRET_KEY: ci-secret-key-minimum-32-characters-long
          FIRST_SUPERUSER_PASSWORD: CiPassword123!Secure
          CACHE_BACKEND: memory
          ENABLE_DH36_LISTENER: "false"
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 --log-level warning > uvicorn-pg.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/api/v1/health && break || sleep 1
          done

      - name: Run clinical flow E2E (uat_smoke) against PostgreSQL
        env:
          UAT_BASE_URL: http://127.0.0.1:8000
          FIRST_SUPERUSER_PASSWORD: CiPassword123!Secure
        run: python -m scripts.uat_smoke

      - name: Upload app log on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: uvicorn-pg-log
          path: uvicorn-pg.log
          if-no-files-found: ignore

  codeql:
    name: CodeQL security analysis
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4

      - name: Analyze code
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: "security"

  e2e:
    name: E2E navigateur (Playwright)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install Playwright (chromium)
        run: |
          npm install -D playwright
          npx playwright install --with-deps chromium

      - name: Start application (SQLite)
        env:
          DATABASE_URL: sqlite:///./e2e.db
          SECRET_KEY: e2e-secret-key-minimum-32-characters-long
          FIRST_SUPERUSER_PASSWORD: E2ePassword123!Secure
          CACHE_BACKEND: memory
        run: |
          alembic upgrade head
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 --log-level warning > uvicorn.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/api/v1/health && break || sleep 1
          done

      - name: Run billing E2E
        env:
          UI_CHECK_BASE_URL: http://127.0.0.1:8000
          FIRST_SUPERUSER_PASSWORD: E2ePassword123!Secure
        run: node scripts/billing_flow_playwright.js

      - name: Upload E2E screenshots
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-screenshots
          path: artifacts/e2e/
          if-no-files-found: ignore

  docker-stack:
    name: Stack Docker production (compose réel)
    # Démarre la VRAIE stack de production (image runtime + docker-compose.yml
    # seul, sans fichier dev) et vérifie ce que les tests unitaires ne voient
    # pas : démarrage du conteneur non-root, healthchecks par rôle, seuls 80/443
    # publiés, flux clinique à travers le proxy TLS.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Build production image
        run: docker build -t ruggylab-os:ci .

      - name: Create production .env
        run: |
          cat > .env <<'EOF'
          RUGGYLAB_IMAGE=ruggylab-os:ci
          SECRET_KEY=ci-secret-key-minimum-32-characters-long
          FIRST_SUPERUSER_PASSWORD=CiPassword123!Secure
          POSTGRES_PASSWORD=ci_pg_password_123
          DATABASE_URL=postgresql+psycopg://ruggylab:ci_pg_password_123@postgres:5432/ruggylab
          GRAFANA_PASSWORD=ci_grafana_password_123
          RUGGYLAB_DOMAIN=localhost
          EOF

      - name: Start dependencies and run migrations
        run: |
          docker compose up -d postgres redis
          docker compose --profile migrate run --rm migrate

      - name: Start full production stack
        run: docker compose up -d

      - name: Wait for app through TLS proxy
        run: |
          for i in $(seq 1 60); do
            curl -skf https://localhost/api/v1/health > /dev/null && break || sleep 2
          done
          curl -skf https://localhost/api/v1/health

      - name: Assert only the proxy publishes ports
        run: |
          docker ps --format '{{.Names}}\t{{.Ports}}'
          leaked=$(docker ps --format '{{.Names}}\t{{.Ports}}' | grep -v proxy | grep -- '->' || true)
          if [ -n "$leaked" ]; then
            echo "::error::Ports publiés hors du proxy :"; echo "$leaked"; exit 1
          fi

      - name: Assert technical paths are blocked at the proxy (§14)
        run: |
          for p in /metrics /docs /openapi.json /redoc; do
            code=$(curl -sk -o /dev/null -w '%{http_code}' "https://localhost$p")
            if [ "$code" != "404" ]; then
              echo "::error::$p renvoie $code via le proxy (attendu 404)"; exit 1
            fi
          done

      - name: Assert Prometheus can still scrape app metrics internally
        run: |
          docker compose exec -T prometheus wget -qO- http://app:8000/metrics | head -1

      - name: Assert automated backup produced a verified dump
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T db-backup sh -c 'ls /backups/ruggylab_pg-*.dump' > /dev/null 2>&1 && break || sleep 2
          done
          docker compose exec -T db-backup sh -c '
            f=$(ls -t /backups/ruggylab_pg-*.dump | head -1) &&
            sha256sum -c "$f.sha256" &&
            cat /backups/last_success.txt'

      - name: Assert role containers are healthy
        run: |
          docker compose ps
          # scheduler (heartbeat) et analyzer-gateway (sonde TCP DH36) doivent
          # devenir healthy — ~1 min (start_period + interval) chacun.
          for svc in scheduler analyzer-gateway; do
            for i in $(seq 1 30); do
              st=$(docker inspect -f '{{.State.Health.Status}}' "$(docker compose ps -q $svc)")
              [ "$st" = "healthy" ] && break || sleep 3
            done
            [ "$st" = "healthy" ] || { echo "::error::$svc = $st"; docker compose logs --tail 50 "$svc"; exit 1; }
          done

      - name: Clinical flow through the TLS proxy
        env:
          UAT_BASE_URL: https://localhost
          UAT_INSECURE_TLS: "1"
          FIRST_SUPERUSER_PASSWORD: CiPassword123!Secure
        run: |
          pip install httpx
          python -m scripts.uat_smoke

      - name: Compose logs on failure
        if: failure()
        run: docker compose logs --tail 200

  deploy:
    name: Build and publish Docker image
    # Déploiement uniquement sur tag de version (vX.Y.Z) ou déclenchement manuel —
    # pas sur chaque commit poussé sur main.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    # E2E bloquant : aucune image n'est publiée si le parcours navigateur (e2e),
    # le flux clinique PostgreSQL (test-postgres) ou la stack Docker de
    # production (docker-stack) échoue.
    needs: [test, test-postgres, codeql, e2e, docker-stack]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          # Chemin aligné sur docker-compose (ghcr.io/<owner>/<repo>:<tag>).
          # L'ancien motif ghcr.io/<owner>/<repo>/ruggylab-os:<sha> doublait le
          # nom du dépôt : l'image publiée n'était jamais celle attendue.
          # Déploiement : RUGGYLAB_IMAGE=ghcr.io/${{ github.repository }}:<sha|vX.Y.Z>
          # Une branche peut contenir "/" (interdit dans un tag OCI) : les
          # déclenchements manuels sur branche publient donc uniquement le SHA.
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('ghcr.io/{0}:{1}', github.repository, github.ref_name) || '' }}
          labels: |
            org.opencontainers.image.title=RuggyLab OS
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
