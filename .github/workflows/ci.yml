name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  test:
    name: Lint, type-check, security and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit pip-audit detect-secrets mypy

      # ── Hard gates (must pass) ──────────────────────────────────────────────
      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy (type check)
        run: mypy app

      - name: Bandit security scan
        run: bandit -q -r app -c pyproject.toml

      - name: Test suite
        run: pytest

      # ── Advisory gates (depend on external state — run and report, never block) ──
      - name: Dependency audit (advisory)
        continue-on-error: true
        run: pip-audit -r requirements.txt

      - name: Secret scan (advisory)
        continue-on-error: true
        run: python -m detect_secrets.pre_commit_hook --baseline .secrets.baseline $(git ls-files)

  test-postgres:
    name: Migrations and smoke test (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ruggylab
          POSTGRES_PASSWORD: ruggylab_test
          POSTGRES_DB: ruggylab_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations (upgrade)
        env:
          DATABASE_URL: postgresql+psycopg://ruggylab:ruggylab_test@localhost:5432/ruggylab_test
          SECRET_KEY: ci-secret-key-minimum-32-characters-long
          FIRST_SUPERUSER_PASSWORD: CiPassword123!Secure
        run: alembic upgrade head

      - name: Verify migration idempotency (downgrade → upgrade)
        env:
          DATABASE_URL: postgresql+psycopg://ruggylab:ruggylab_test@localhost:5432/ruggylab_test
          SECRET_KEY: ci-secret-key-minimum-32-characters-long
          FIRST_SUPERUSER_PASSWORD: CiPassword123!Secure
        run: |
          alembic downgrade base
          alembic upgrade head

      - name: Smoke-test app startup against PostgreSQL
        env:
          DATABASE_URL: postgresql+psycopg://ruggylab:ruggylab_test@localhost:5432/ruggylab_test
          SECRET_KEY: ci-secret-key-minimum-32-characters-long
          FIRST_SUPERUSER_PASSWORD: CiPassword123!Secure
          TESTING: "true"
        run: |
          python - <<'EOF'
          import os
          os.environ.setdefault("TESTING", "true")
          from sqlalchemy import text

          from app.db.session import engine

          with engine.connect() as conn:
              count = conn.execute(text("SELECT count(*) FROM users")).scalar()
          print(f"PostgreSQL smoke-test OK — {count} user(s) in DB")
          EOF

  codeql:
    name: CodeQL security analysis
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze code
        uses: github/codeql-action/analyze@v4
        with:
          category: "security"

  deploy:
    name: Build and publish Docker image
    # Déploiement uniquement sur tag de version (vX.Y.Z) ou déclenchement manuel —
    # pas sur chaque commit poussé sur main.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [test, test-postgres, codeql]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/ruggylab-os:${{ github.sha }}
          labels: |
            org.opencontainers.image.title=RuggyLab OS
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
