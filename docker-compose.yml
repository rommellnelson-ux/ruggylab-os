# docker-compose.yml – Production configuration
# Dev local : docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# (AUCUN fichier n'est fusionné implicitement — production = ce fichier seul)
# Run migrations manually: docker compose --profile migrate up migrate
#
# Réseau (§8/§9) : SEUL le reverse proxy `proxy` publie des ports (80/443). L'app,
# PostgreSQL, Redis, Prometheus et Grafana n'exposent aucun port. Segmentation :
#   frontend_net   : proxy, app
#   backend_net    : app, scheduler, analyzer-gateway, postgres, redis, prometheus, migrate
#   management_net : prometheus, grafana (accès VPN/bastion — jamais le VLAN clinique)
#   analyzer_net   : analyzer-gateway (automates)
#
# Required environment variables (copy .env.example → .env and fill in):
#   DATABASE_URL, SECRET_KEY, REDIS_URL, FIRST_SUPERUSER_PASSWORD
#   POSTGRES_PASSWORD, GRAFANA_PASSWORD, RUGGYLAB_DOMAIN

services:

  # ── Reverse proxy TLS (SEUL service exposé) ──────────────────────────────────
  proxy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      RUGGYLAB_DOMAIN: ${RUGGYLAB_DOMAIN:-localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - frontend_net

  # ── Application (rôle web) ───────────────────────────────────────────────────
  app:
    build:
      context: .
      target: runtime
    # Artefact immuable exigé : chaque déploiement désigne un tag précis
    # (ex. RUGGYLAB_IMAGE=ghcr.io/rommellnelson-ux/ruggylab-os:<git-sha>).
    # Jamais `latest` en production (§10 des Instructions maîtres).
    image: ${RUGGYLAB_IMAGE:?RUGGYLAB_IMAGE must be set (immutable tag, e.g. ghcr.io/rommellnelson-ux/ruggylab-os:<git-sha>)}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ruggylab:CHANGE_ME@postgres:5432/ruggylab}  # pragma: allowlist secret
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD}
      CACHE_BACKEND: redis
      # Gouvernance clinique : en production, un compte-rendu ne peut être publié
      # sans validation. Ne passer à false qu'avec une procédure « provisoire »
      # documentée (rôle, motif, filigrane, file d'attente, délai maximal).
      REQUIRE_VALIDATION_FOR_RELEASE: ${REQUIRE_VALIDATION_FOR_RELEASE:-true}
      # Rôle web : sert l'API/UI + fan-out WebSocket ; ne lance NI la purge des
      # jetons NI le listener DH36 (délégués aux services scheduler / gateway
      # ci-dessous), pour éviter les duplications si l'app est scalée.
      PROCESS_ROLE: web
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Pas de `ports:` — l'app n'est jointe que par le proxy (frontend_net).
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    volumes:
      - app_data:/app/data
      - app_models:/app/models
    networks:
      - frontend_net
      - backend_net

  # ── Scheduler (tâches planifiées, exemplaire unique) ─────────────────────────
  # Même image que `app`, rôle scheduler : purge des jetons, etc. NE PAS scaler.
  scheduler:
    build:
      context: .
      target: runtime
    image: ${RUGGYLAB_IMAGE:?RUGGYLAB_IMAGE must be set}
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ruggylab:CHANGE_ME@postgres:5432/ruggylab}  # pragma: allowlist secret
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PROCESS_ROLE: scheduler
    # Le HEALTHCHECK de l'image sonde HTTP:8000 (rôle web) ; ce process ne sert
    # pas d'HTTP → on le neutralise pour éviter un `unhealthy` permanent.
    # TODO(P1) : heartbeat dédié (fichier/DB horodaté par la boucle du scheduler).
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend_net

  # ── Analyzer gateway (listener DH36, exemplaire unique — bind un port) ────────
  analyzer-gateway:
    build:
      context: .
      target: runtime
    image: ${RUGGYLAB_IMAGE:?RUGGYLAB_IMAGE must be set}
    restart: unless-stopped
    command: ["python", "-m", "app.analyzer_gateway"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ruggylab:CHANGE_ME@postgres:5432/ruggylab}  # pragma: allowlist secret
      SECRET_KEY: ${SECRET_KEY}
      PROCESS_ROLE: analyzer-gateway
      ENABLE_DH36_LISTENER: "true"
      # Écoute sur toutes les interfaces internes pour recevoir les trames automates.
      DH36_LISTENER_HOST: 0.0.0.0
    # Healthcheck adapté au rôle : le listener DH36 doit accepter une connexion
    # TCP (remplace la sonde HTTP:8000 héritée de l'image, toujours KO ici).
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket; socket.create_connection(('127.0.0.1', 5001), timeout=3).close()"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    # Pour recevoir les automates du LAN, publier le port DH36 LIÉ à l'interface
    # du VLAN automates uniquement, p.ex. :  ports: ["10.0.30.1:5001:5001"]
    # (ne jamais publier sur 0.0.0.0 — cf. §8.1).
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - analyzer_net
      - backend_net

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ruggylab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ruggylab}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ruggylab} -d ${POSTGRES_DB:-ruggylab}"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
      - backend_net

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - backend_net

  # ── Prometheus (management — non publié) ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    # Pas de `ports:` — accès via VPN/bastion uniquement (jamais le VLAN clinique).
    depends_on:
      - app
    networks:
      - backend_net       # pour scraper app:8000/metrics
      - management_net    # pour Grafana / accès management

  # ── Grafana (management — non publié) ────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/ruggylab-os.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    # Pas de `ports:` — accès via VPN/bastion uniquement.
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - management_net

  # ── Migrations (run-once, manual) ────────────────────────────────────────────
  migrate:
    build:
      context: .
      target: runtime
    image: ${RUGGYLAB_IMAGE:?RUGGYLAB_IMAGE must be set}
    command: ["alembic", "upgrade", "head"]
    healthcheck:
      disable: true   # run-once : la sonde HTTP de l'image n'a pas de sens ici
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ruggylab:CHANGE_ME@postgres:5432/ruggylab}  # pragma: allowlist secret
      SECRET_KEY: ${SECRET_KEY:-placeholder-only-needed-at-import-time}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD:-placeholder}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate
    networks:
      - backend_net

# ── Named volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  app_data:
  app_models:
  grafana_data:
  caddy_data:
  caddy_config:

# ── Networks (§8.2) ──────────────────────────────────────────────────────────
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
  management_net:
    driver: bridge
  analyzer_net:
    driver: bridge
