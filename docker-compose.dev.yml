# docker-compose.dev.yml – Local development overrides
#
# ATTENTION : ce fichier n'est PLUS fusionné automatiquement (il s'appelait
# docker-compose.override.yml, que Compose charge silencieusement — en production,
# `docker compose up -d` annulait alors l'architecture : --reload, PROCESS_ROLE=all
# dupliquant les singletons, ports réouverts). Usage explicite désormais :
#
#   Développement : docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Production    : docker compose up -d          (docker-compose.yml seul)
#
# Le dev tourne sur PostgreSQL par défaut (parité avec la prod ; démarre
# postgres avant l'app). Repli SQLite zéro-dépendance :
#   DATABASE_URL=sqlite:///./ruggylab_os.db docker compose -f ... -f ... up app
#
# Do NOT commit secrets here; use a local .env file.

services:

  app:
    image: ruggylab-os:dev
    build:
      context: .
      target: runtime
    # Hot-reload: mount source code and run uvicorn with --reload
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    # En dev, on accède à l'app directement sur localhost:8000 (on court-circuite
    # le reverse proxy). En prod, seul le service `proxy` (80/443) est exposé.
    ports:
      - "127.0.0.1:8000:8000"
    # En dev, l'app fait tout (mono-process) : pas besoin des services scheduler /
    # analyzer-gateway. Stack minimale : `docker compose up app postgres redis`.
    volumes:
      # Live source mount – changes take effect without rebuilding the image
      - ./app:/app/app:ro
      - ./alembic:/app/alembic:ro
      - ./alembic.ini:/app/alembic.ini:ro
      - ./data:/app/data
      - ./models:/app/models
    environment:
      # En dev, l'app assure tous les rôles (web + scheduler + gateway).
      PROCESS_ROLE: all
      # PARITÉ DEV/PROD : le dev tourne sur PostgreSQL par défaut (le vrai moteur),
      # ce qui expose immédiatement les divergences SQLite↔PG (enums, contraintes,
      # JSON) — c'est ce qui aurait attrapé le bug userrole avant la CI.
      # Repli SQLite (zéro dépendance) : DATABASE_URL=sqlite:///./ruggylab_os.db
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ruggylab:${POSTGRES_PASSWORD:-devpass}@postgres:5432/ruggylab}  # pragma: allowlist secret
      # Le schéma dev vient de create_all (pas d'étape migrate manuelle) : on
      # débraye le verrou de migration, réservé à la production.
      SKIP_MIGRATION_CHECK: "1"
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-NOT-for-production-use-32c}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD:-DevPassword123!}
      CACHE_BACKEND: ${CACHE_BACKEND:-memory}

  # En dev, l'app (PROCESS_ROLE=all) assure aussi ces rôles ; on fixe seulement
  # une image locale pour ne pas exiger RUGGYLAB_IMAGE (requis en production).
  scheduler:
    image: ruggylab-os:dev
    profiles: ["workers"]   # optionnel en dev : docker compose --profile workers up

  analyzer-gateway:
    image: ruggylab-os:dev
    profiles: ["workers"]

  migrate:
    image: ruggylab-os:dev

  postgres:
    # Mot de passe par défaut en dev (la prod l'exige via `:?`) : parité sans
    # imposer un .env pour un simple `up`.
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
    # Expose PG on localhost so local tools (psql, DBeaver…) can connect
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    # Expose Redis on localhost for local debugging
    ports:
      - "127.0.0.1:6379:6379"

  prometheus:
    # Restrict Prometheus to localhost in dev (not publicly accessible)
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    # Restrict Grafana to localhost in dev
    ports:
      - "127.0.0.1:3000:3000"
