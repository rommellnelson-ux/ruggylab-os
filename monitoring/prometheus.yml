global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: production
    app: ruggylab-os

rule_files:
  - /etc/prometheus/rules/*.yml

# Alertmanager configuration (optional – uncomment to enable)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

scrape_configs:
  # ── RuggyLab OS application metrics ─────────────────────────────────────────
  - job_name: ruggylab-os
    static_configs:
      - targets: ["app:8001"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # ── Prometheus self-monitoring ───────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
